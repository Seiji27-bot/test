<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヨット連盟ポータル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="card.css">
    <link rel="stylesheet" href="container.css">
    <link rel="stylesheet" href="base.css">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <a href="https://sites.google.com/view/kansaigakuren-sailing" target="_blank">
            <img src="Images/IMG_3654.JPG" alt="ロゴ" class="header-logo">
        </a>
        <div class="social-icons">
            <a href="https://www.instagram.com/kansaigakuren_sailing/"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.youtube.com/channel/UCZpQe6d9m9fIYeZAnf8CyMw"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <div class="header-center">
        <p>関西学生ヨット連盟 公式サイト</p>
    </div>

    <div class="header-right">
        <div class="menu-button">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>
</header>

<main>
    <div class="main-card">
        <div class="image-area">
            <img src="Images/IMG_3654.JPG" alt="メイン画像">
        </div>
        <div class="text-area">
            <h2>お知らせ</h2>
            <p>最新の大会情報や連盟からの告知を掲載しています。詳細は以下の各項目を確認してください。</p>
        </div>
    </div>

    <div class="container">
        <p class="intro-text">※最新の情報をこちらで確認してください。</p>

        <div class="box-row">
            <div class="info-box special-box">
                <i class="fa-solid fa-clipboard"></i>
                <h3>掲示板</h3>
                <p>重要な連絡事項をここに掲載します。</p>
            </div>
        </div>

        <p class="row-divider">戦績とメンバーについて</p>

        <div class="box-row">
            <div class="info-box">
                <i class="fa-solid fa-chart-column"></i>
                <h3>成績表</h3>
                <p>大会記録・スコア</p>
            </div>
            <div class="info-box">
                <i class="fa-solid fa-users"></i>
                <h3>乗員表</h3>
                <p>各艇のメンバーリスト</p>
            </div>
            <div class="info-box">
                <i class="fa-solid fa-user-plus"></i>
                <h3>登録</h3>
                <p>新規入会・変更届</p>
            </div>
        </div>

        <p class="row-divider">ルールとマナー</p>

        <div class="box-row">
            <div class="info-box">
                <i class="fa-solid fa-file-shield"></i>
                <h3>遵守事項</h3>
                <p>安全規定の遵守</p>
            </div>
            <div class="info-box">
                <i class="fa-solid fa-scale-balanced"></i>
                <h3>規約</h3>
                <p>連盟規約と罰則</p>
            </div>
        </div>

        <p class="row-divider">その他</p>

        <div class="box-row">
            <div class="info-box">
                <i class="fa-solid fa-envelope"></i>
                <h3>お問合せ</h3>
                <p>事務局へ送る</p>
            </div>
            <div class="info-box">
                <i class="fa-solid fa-circle-question"></i>
                <h3>Q&A</h3>
                <p>よくある質問</p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
